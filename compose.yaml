version: '3.8'

services:
  db:
    image: postgres:18.3-alpine
    container_name: margin_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: margindb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql:z

  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    container_name: margin_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app:z
    environment:
      - DATABASE_URL=postgresql+psycopg://admin:password@db:5432/margindb
    depends_on:
      - db

    frontend:
      build:
        context: ./frontend
      container_name: margin_frontend
      ports:
        - "5173:5173"
      volumes:
        - ./frontend:/app:z
        - /app/node_modules
      depends_on:
        - backend

volumes:
  postgres_data:
